name: Build Android APK

on:
  workflow_dispatch:       # Manual trigger from GitHub UI
  push:
    branches: [master]    # Auto-build on every push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure Android SDK + NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Download ESRGAN TFLite model
        run: |
          mkdir -p assets/models
          # Try multiple sources. Model is ~5.8 MB (50×50→200×200 ESRGAN super-resolution).
          URLS=(
            "https://media.githubusercontent.com/media/tensorflow/examples/master/lite/examples/super_resolution/android/app/src/main/assets/ESRGAN.tflite"
            "https://raw.githubusercontent.com/google-ai-edge/mediapipe-samples/main/examples/super_resolution/android/app/src/main/assets/ESRGAN.tflite"
          )
          SUCCESS=false
          for URL in "${URLS[@]}"; do
            echo "Trying: $URL"
            if curl -L "$URL" -o assets/models/esrgan.tflite --max-time 300 --retry 3 --retry-delay 10 --fail; then
              SIZE=$(wc -c < assets/models/esrgan.tflite)
              if [ "$SIZE" -gt 1000000 ]; then
                echo "Model OK: $(du -sh assets/models/esrgan.tflite)"
                SUCCESS=true
                break
              else
                echo "File too small ($SIZE bytes) — trying next source"
                rm -f assets/models/esrgan.tflite
              fi
            else
              echo "Download failed — trying next source"
              rm -f assets/models/esrgan.tflite
            fi
          done
          if [ "$SUCCESS" = false ]; then
            echo "WARNING: ESRGAN model unavailable — AI Upscale feature will be disabled in this build."
            touch assets/models/esrgan.tflite
          fi

      - name: Build APK (local, no quota used)
        run: eas build --local --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAWEye-preview
          path: '**/*.apk'
          retention-days: 30
