name: Build Android APK

on:
  workflow_dispatch:       # Manual trigger from GitHub UI
  push:
    branches: [master]    # Auto-build on every push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure Android SDK + NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Download ESRGAN TFLite model
        run: |
          mkdir -p assets/models
          curl -L "https://storage.googleapis.com/tfhub-lite-models/captain-pool/lite-model/esrgan-tf2/1/default/1.tflite" \
            -o assets/models/esrgan.tflite \
            --max-time 120 \
            --fail \
            && echo "Model downloaded: $(du -sh assets/models/esrgan.tflite)" \
            || (echo "WARNING: ESRGAN model download failed — upscaler will be unavailable" && touch assets/models/esrgan.tflite)

      - name: Build APK (local, no quota used)
        run: eas build --local --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAWEye-preview
          path: '**/*.apk'
          retention-days: 30
